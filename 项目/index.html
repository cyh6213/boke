<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />

    <title>项目 | 程愚瀚</title>
    <link rel="stylesheet" href="../资源/css/style.css" />
    <style>
        .project-list { max-width: 960px; padding: 120px 60px 80px; }
        .project-item {
            background: #ffffff; border: 1px solid #e9edf4;
            border-radius: 16px; padding: 28px 32px; margin-bottom: 20px;
            transition: all 0.25s; display: block; text-decoration: none; color: inherit;
        }
        .project-item:hover { border-color: #c7d2fe; box-shadow: 0 8px 24px rgba(79,70,229,0.06); transform: translateY(-2px); }
        .project-item h3 { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
        .project-item p { font-size: 14px; color: #475569; line-height: 1.8; }
        .project-item .project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .project-item .project-tags span {
            padding: 3px 10px; border-radius: 20px; font-size: 12px;
            font-weight: 500;
        }
        .tag-rag { background: #eef2ff; color: #4f46e5; }
        .tag-workflow { background: #ecfdf5; color: #059669; }
        .tag-myclaw { background: #f5f3ff; color: #7c3aed; }
        .empty-state {
            text-align: center; padding: 80px 20px; color: #94a3b8;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="../" class="nav-brand">程愚瀚</a>
        <div class="nav-links">
            <a href="../">首页</a>

            <a href="./" class="active">项目</a>
        </div>
    </nav>

    <div class="main" style="margin-left: 0;">
        <div class="project-list">
            <div class="section-label">Projects</div>
            <h2 class="section-title">项目</h2>

            <div class="empty-state">
                <div class="icon">🚧</div>
                <p>项目详情页面正在建设中...</p>
            </div>
